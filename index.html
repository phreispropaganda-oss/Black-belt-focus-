<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Currículo Faixa Roxa — BJJ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#0d0d0d;
  --bg2:#141414;
  --bg3:#1a1a1a;
  --bg4:#222;
  --border:#2a2a2a;
  --border2:#333;
  --text:#e8e4dc;
  --text2:#9a9690;
  --text3:#5a5754;
  --accent:#c9a84c;
  --accent2:#a8873a;
  --purple:#7F77DD;
  --purple-bg:#1a1830;
  --teal:#1D9E75;
  --teal-bg:#0a1f18;
  --coral:#D85A30;
  --coral-bg:#1f120a;
  --red:#E24B4A;
  --red-bg:#1f0d0d;
  --amber:#BA7517;
  --amber-bg:#1f1507;
  --gray:#888780;
  --gray-bg:#161616;
  --green:#639922;
  --green-bg:#0f1a07;
  --blue:#378ADD;
  --blue-bg:#0a1520;
  --pink:#D4537E;
  --pink-bg:#1f0d14;
  --radius:10px;
  --radius-sm:7px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}

/* ── SCREEN MANAGEMENT ── */
.screen{display:none;min-height:100vh}
.screen.active{display:flex}

/* ── LOGIN ── */
#screen-login{align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.login-box{width:100%;max-width:380px}
.login-logo{text-align:center;margin-bottom:2rem}
.login-logo .belt{display:inline-block;width:48px;height:16px;background:var(--purple);border-radius:3px;margin-bottom:10px;position:relative}
.login-logo .belt::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;background:#000;border-radius:50%}
.login-logo h1{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);font-weight:400}
.login-logo p{font-size:13px;color:var(--text2);margin-top:4px}
.login-form{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;letter-spacing:.3px}
.form-group input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;font-size:15px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.form-group input:focus{border-color:var(--accent)}
.btn-login{width:100%;background:var(--accent);color:#000;border:none;border-radius:var(--radius-sm);padding:12px;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;margin-top:.25rem}
.btn-login:hover{background:var(--accent2)}
.login-error{font-size:13px;color:var(--red);text-align:center;margin-top:.75rem;min-height:20px}

/* ── APP SHELL ── */
#screen-app{flex-direction:column;min-height:100vh}
.app-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.app-header-left{display:flex;align-items:center;gap:10px}
.app-header-logo{font-family:'DM Serif Display',serif;font-size:18px;color:var(--accent)}
.app-header-sub{font-size:11px;color:var(--text3);display:none}
.app-user{display:flex;align-items:center;gap:8px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--purple-bg);border:1px solid var(--purple);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--purple);cursor:pointer;flex-shrink:0}
.app-content{flex:1;padding:0}

/* ── NAV TABS ── */
.nav-tabs{display:flex;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;gap:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;padding:12px 14px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-tab i{font-size:15px}
.nav-tab .soon-dot{display:inline-block;width:5px;height:5px;background:var(--border2);border-radius:50%;margin-left:3px}

/* ── MODULE PANELS ── */
.module-panel{display:none;padding:16px;animation:fadeIn .2s ease}
.module-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── MODULE HERO ── */
.mod-hero{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;display:grid;grid-template-columns:60px 1fr;gap:12px;align-items:start}
.mod-number{font-family:'DM Serif Display',serif;font-size:52px;line-height:1;color:var(--accent);letter-spacing:-2px}
.mod-meta{padding-top:2px}
.mod-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;background:var(--purple-bg);color:var(--purple);padding:2px 8px;border-radius:4px;font-weight:500;margin-bottom:6px}
.mod-title{font-size:20px;font-weight:500;color:var(--text);line-height:1.2;margin-bottom:4px}
.mod-desc{font-size:13px;color:var(--text2);line-height:1.5}
.mod-stats-row{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.mod-stat{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px}
.mod-stat i{font-size:13px}

/* ── PROGRESS BAR ── */
.progress-section{margin-bottom:16px}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-label{font-size:12px;color:var(--text3)}
.progress-value{font-size:12px;font-weight:500;color:var(--accent)}
.progress-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .4s ease}

/* ── CATEGORY BLOCK ── */
.cat-block{margin-bottom:8px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.cat-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;background:var(--bg2);transition:background .15s;-webkit-tap-highlight-color:transparent}
.cat-header:active{background:var(--bg3)}
.cat-icon{width:30px;height:30px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cat-icon i{font-size:16px}
.cat-name{font-size:14px;font-weight:500;color:var(--text);flex:1}
.cat-meta{display:flex;align-items:center;gap:6px}
.cat-count{font-size:11px;color:var(--text3)}
.cat-pct{font-size:11px;font-weight:500}
.cat-chev{font-size:16px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.cat-chev.open{transform:rotate(180deg)}
.cat-body{display:none;background:var(--bg)}
.cat-body.open{display:block}

/* ── TECHNIQUE CARD ── */
.tech-card{border-top:1px solid var(--border);transition:background .15s}
.tech-card.done-card .tech-row{opacity:.7}
.tech-row{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;transition:background .15s}
.tech-row:active{background:var(--bg2)}
.tech-num{font-size:11px;color:var(--text3);min-width:18px;font-variant-numeric:tabular-nums}
.tech-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tech-name{font-size:14px;color:var(--text);flex:1}
.tech-badge{font-size:10px;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.badge-todo{background:var(--bg3);color:var(--text3)}
.badge-done{background:var(--teal-bg);color:var(--teal)}
.tech-chev{font-size:15px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.tech-chev.open{transform:rotate(180deg)}

/* ── TECH DETAIL ── */
.tech-detail{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.tech-detail.open{display:block}
.detail-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px;padding-top:12px}
.steps-list{margin-bottom:12px}
.step-item{display:flex;gap:10px;padding:5px 0;font-size:13px;color:var(--text);line-height:1.5}
.step-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;margin-top:2px}
.tip-box{display:flex;gap:8px;align-items:flex-start;background:var(--bg2);border-radius:var(--radius-sm);padding:9px 12px;margin-bottom:12px;font-size:12px;color:var(--text2);line-height:1.5}
.tip-box i{font-size:14px;flex-shrink:0;margin-top:1px;color:var(--amber)}
.action-row{display:flex;gap:6px;flex-wrap:wrap}
.act-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);cursor:pointer;text-decoration:none;color:var(--text2);background:var(--bg2);font-family:'DM Sans',sans-serif;transition:background .15s}
.act-btn:active{background:var(--bg3)}
.act-btn i{font-size:14px}
.act-btn.done-btn{background:var(--teal-bg);border-color:var(--teal);color:var(--teal)}

/* ── COMING SOON MODULE ── */
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px;min-height:300px}
.cs-icon{width:60px;height:60px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.cs-icon i{font-size:28px;color:var(--text3)}
.cs-title{font-size:18px;font-weight:500;color:var(--text);margin-bottom:8px}
.cs-desc{font-size:14px;color:var(--text2);max-width:260px;line-height:1.5}
.cs-badge{display:inline-block;font-size:11px;background:var(--bg2);border:1px solid var(--border);color:var(--text3);padding:4px 12px;border-radius:20px;margin-top:16px}

/* ── ADMIN PANEL ── */
#screen-admin{flex-direction:column;min-height:100vh}
.admin-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.admin-header h2{font-family:'DM Serif Display',serif;font-size:18px;color:var(--accent);font-weight:400}
.admin-content{flex:1;padding:16px;max-width:480px;margin:0 auto;width:100%}
.admin-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.admin-section h3{font-size:14px;font-weight:500;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.admin-section h3 i{font-size:16px;color:var(--accent)}
.admin-user-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.admin-user-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--bg3);border-radius:var(--radius-sm);font-size:13px;color:var(--text)}
.admin-user-item .email{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.admin-user-item .role{font-size:11px;color:var(--text3);background:var(--bg);padding:2px 7px;border-radius:4px;flex-shrink:0;margin:0 8px}
.admin-user-item .del-btn{color:var(--red);background:none;border:none;cursor:pointer;padding:4px;font-size:16px;display:flex;align-items:center;flex-shrink:0}
.admin-add-form{display:flex;flex-direction:column;gap:10px}
.admin-add-form input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.admin-add-form input:focus{border-color:var(--accent)}
.btn-add{background:var(--accent);color:#000;border:none;border-radius:var(--radius-sm);padding:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}
.btn-add:hover{background:var(--accent2)}
.admin-msg{font-size:13px;text-align:center;margin-top:8px;min-height:18px}
.admin-msg.ok{color:var(--teal)}
.admin-msg.err{color:var(--red)}
.btn-back{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:4px 0}

/* ── DROPDOWN MENU ── */
.user-menu{position:absolute;top:56px;right:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;z-index:200;min-width:200px;display:none}
.user-menu.open{display:block}
.user-menu-info{padding:12px 14px;border-bottom:1px solid var(--border)}
.user-menu-name{font-size:13px;font-weight:500;color:var(--text)}
.user-menu-email{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-menu-item{display:flex;align-items:center;gap:8px;padding:11px 14px;font-size:13px;color:var(--text2);cursor:pointer;transition:background .15s}
.user-menu-item:hover{background:var(--bg3)}
.user-menu-item i{font-size:16px}
.user-menu-item.danger{color:var(--red)}

/* ── GLOBAL PROGRESS ── */
.global-prog{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.gp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.gp-label{font-size:11px;color:var(--text3)}
.gp-value{font-size:11px;font-weight:500;color:var(--accent)}
.gp-track{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.gp-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .4s ease}

@media(min-width:480px){
  .app-header-sub{display:block}
  .mod-hero{grid-template-columns:70px 1fr}
  .mod-number{font-size:60px}
}

/* ── TDAH BUTTON + XP ── */
.tdah-toggle{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);cursor:pointer;color:var(--text2);font-size:16px;transition:all .15s;flex-shrink:0}
.tdah-toggle.on{background:var(--purple-bg);border-color:var(--purple);color:var(--purple)}
.xp-chip{display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:3px 9px;font-size:12px;font-weight:600;color:#F5A623}
.xp-chip i{font-size:13px}

/* ── FOCUS CARD (TDAH MODE) ── */
body.tdah-mode .cat-block{display:none!important}
body.tdah-mode .focus-wrap{display:block!important}
.focus-wrap{display:none}
.focus-hint{background:var(--purple-bg);border:1px solid var(--purple);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.5}
.focus-hint strong{color:var(--purple)}
.focus-nav-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.fnav-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;color:var(--text2);flex-shrink:0}
.fnav-btn:active{background:var(--bg3)}
.fnav-info{flex:1;text-align:center;font-size:12px;color:var(--text3)}
.focus-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden}
.fc-top{padding:14px 14px 10px}
.fc-cat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;opacity:.7}
.fc-title{font-size:20px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:10px}
.fc-body{padding:0 14px 14px;display:flex;flex-direction:column;gap:8px}
.fc-steps-list{display:flex;flex-direction:column;gap:7px}
.fc-step{display:flex;gap:9px;align-items:flex-start}
.fc-step-n{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.fc-step-t{font-size:14px;color:var(--text);line-height:1.5;padding-top:2px}
.fc-actions{padding:12px 14px;background:var(--bg3);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.fc-mark-btn{display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:600;padding:11px;border-radius:var(--radius-sm);border:1px solid var(--border2);cursor:pointer;font-family:'DM Sans',sans-serif;background:var(--bg2);color:var(--text2);transition:all .15s}
.fc-mark-btn.done{background:var(--teal-bg);border-color:var(--teal);color:var(--teal)}
.fc-mark-btn i{font-size:16px}

/* ── POS BOX + MISTAKE BOX ── */
.pos-box{background:var(--bg3);border-radius:var(--radius-sm);padding:9px 11px;margin-bottom:9px;font-size:12px;color:var(--text2);line-height:1.5;border-left:2px solid var(--accent)}
.pos-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);display:block;margin-bottom:3px}
.mistake-box{display:flex;gap:7px;align-items:flex-start;background:rgba(226,75,74,.08);border:1px solid rgba(226,75,74,.18);border-radius:var(--radius-sm);padding:8px 10px;font-size:12px;color:var(--text2);line-height:1.5}
.mistake-box i{color:var(--red);font-size:14px;flex-shrink:0;margin-top:1px}

/* ── TIMER CHIPS ── */
.timer-chips{display:flex;gap:5px;flex-wrap:wrap}
.timer-chip{font-size:11px;padding:5px 9px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:3px}
.timer-chip:active{background:var(--bg3)}
.timer-chip i{font-size:12px}

/* ── TIMER OVERLAY ── */
.timer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.timer-overlay.active{display:flex}
.timer-circle{width:180px;height:180px;border-radius:50%;background:var(--bg2);border:3px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-time{font-family:'DM Serif Display',serif;font-size:52px;color:var(--accent);letter-spacing:-2px;line-height:1}
.timer-sub{font-size:12px;color:var(--text3);margin-top:4px}
.timer-tname{font-size:13px;font-weight:600;color:var(--text);text-align:center;max-width:220px}
.timer-btns{display:flex;gap:10px}
.tbtn{padding:10px 20px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.tbtn.primary{background:var(--accent);border-color:var(--accent);color:#000}
.tbtn:active{opacity:.8}

/* ── XP TOAST ── */
.xp-toast{position:fixed;top:66px;right:14px;background:var(--bg2);border:1px solid #F5A623;border-radius:var(--radius);padding:9px 13px;z-index:400;display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#F5A623;transform:translateX(200%);transition:transform .25s;pointer-events:none}
.xp-toast.show{transform:translateX(0)}
.xp-toast i{font-size:17px}
</style>
</head>
<body>

<!-- ═══════════════════════════ LOGIN ═══════════════════════════ -->
<div id="screen-login" class="screen active">
  <div class="login-box">
    <div class="login-logo">
      <div class="belt"></div>
      <h1>Faixa Roxa</h1>
      <p>Currículo técnico de jiu-jitsu</p>
    </div>
    <div class="login-form">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-login" onclick="doLogin()">Entrar</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════ APP ═══════════════════════════ -->
<div id="screen-app" class="screen">
  <div style="position:relative">
    <div class="app-header">
      <div class="app-header-left">
        <div class="app-header-logo">BJJ</div>

// ─── TIMER ───
let timerInterval=null, timerPaused=false, timerSecs=0;
function startTimer(mins, techName){
  if(timerInterval)clearInterval(timerInterval);
  timerSecs=mins*60; timerPaused=false;
  document.getElementById('timer-tname').textContent='Treinando: '+techName;
  document.getElementById('timer-pause-btn').textContent='Pausar';
  updateTimerDisp();
  document.getElementById('timer-overlay').classList.add('active');
  timerInterval=setInterval(()=>{
    if(!timerPaused){
      timerSecs--;
      updateTimerDisp();
      if(timerSecs<=0){clearInterval(timerInterval);document.getElementById('timer-sub').textContent='⏱ Tempo!';}
    }
  },1000);
}
function updateTimerDisp(){
  const m=Math.floor(timerSecs/60), s=timerSecs%60;
  document.getElementById('timer-disp').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  document.getElementById('timer-sub').textContent=timerSecs>0?'restante':'⏱ Tempo!';
}
function pauseTimer(){
  timerPaused=!timerPaused;
  document.getElementById('timer-pause-btn').textContent=timerPaused?'Continuar':'Pausar';
}
function stopTimer(){
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=null;
  document.getElementById('timer-overlay').classList.remove('active');
}

function toggleTDAH(){
  tdahMode=!tdahMode;

  document.getElementById('tdah-toggle').classList.toggle('on',tdahMode);
  buildPanels();

function focusNav(mi,dir){
  const m=MODULES[mi];
  const total=m.categories.reduce((a,c)=>a+c.techniques.length,0);
  focusIdx[mi]=(focusIdx[mi]||0)+dir;
  if(focusIdx[mi]<0)focusIdx[mi]=0;
  if(focusIdx[mi]>=total)focusIdx[mi]=total-1;
  document.getElementById('panel-'+mi).innerHTML=buildModule(m,mi);
}

function getTimerChipsHTML(techName){
  return`<div class="timer-chips">
    <div class="timer-chip" onclick="startTimer(3,'${techName.replace(/'/g,"\\'")}')"><i class="ti ti-player-play"></i> 3 min</div>
    <div class="timer-chip" onclick="startTimer(5,'${techName.replace(/'/g,"\\'")}')"><i class="ti ti-player-play"></i> 5 min</div>
    <div class="timer-chip" onclick="startTimer(10,'${techName.replace(/'/g,"\\'")}')"><i class="ti ti-player-play"></i> 10 min</div>
  </div>`;
}

// ─── AUTH ───
const ADMIN = 'phreis.propaganda@gmail.com';

async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function getUsers(){
  return JSON.parse(localStorage.getItem('bjj_users')||'{}');
}
function saveUsers(u){
  localStorage.setItem('bjj_users', JSON.stringify(u));
}
function getSession(){
  return JSON.parse(sessionStorage.getItem('bjj_session')||'null');
}
function setSession(user){
  sessionStorage.setItem('bjj_session', JSON.stringify(user));
}

async function seedAdmin(){
  const users = getUsers();
  if(!users[ADMIN]){
    const hash = await sha256('bjj2025');
    users[ADMIN] = {name:'Admin', hash, role:'admin'};
    saveUsers(users);
  }
}

async function doLogin(){
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if(!email||!pass){errEl.textContent='Preencha e-mail e senha.';return;}
  const users = getUsers();
  const user = users[email];
  if(!user){errEl.textContent='Usuário não encontrado.';return;}
  const hash = await sha256(pass);
  if(hash !== user.hash){errEl.textContent='Senha incorreta.';return;}
  setSession({email, name:user.name, role:user.role});
  showApp();
}

function doLogout(){
  sessionStorage.removeItem('bjj_session');
  showScreen('login');
  document.getElementById('user-menu').classList.remove('open');
}

function showApp(){
  const s = getSession();
  if(!s){showScreen('login');return;}
  document.getElementById('user-avatar').textContent = (s.name||s.email).charAt(0).toUpperCase();
  document.getElementById('menu-name').textContent = s.name || '–';
  document.getElementById('menu-email').textContent = s.email;
  document.getElementById('menu-admin-btn').style.display = s.role==='admin' ? 'flex' : 'none';
  showScreen('app');
  buildApp();
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
}

function toggleMenu(){
  document.getElementById('user-menu').classList.toggle('open');
}
document.addEventListener('click', e=>{
  const menu = document.getElementById('user-menu');
  const avatar = document.getElementById('user-avatar');
  if(menu && !menu.contains(e.target) && e.target!==avatar) menu.classList.remove('open');
});

function goAdmin(){
  document.getElementById('user-menu').classList.remove('open');
  renderAdminUsers();
  showScreen('admin');
}
function goApp(){showScreen('app');}

// ─── PROGRESS ───
function getProgress(){
  const s = getSession();
  if(!s) return {};
  return JSON.parse(localStorage.getItem('bjj_prog_'+s.email)||'{}');
}
function saveProgress(p){
  const s = getSession();
  if(!s) return;
  localStorage.setItem('bjj_prog_'+s.email, JSON.stringify(p));
}
function isDone(key){return !!getProgress()[key]}
function toggleDoneKey(key){
  const p = getProgress();
  if(p[key]) delete p[key]; else p[key]=1;
  saveProgress(p);
}

function totalTechs(){
  return MODULES.filter(m=>!m.soon).reduce((a,m)=>a+m.categories.reduce((b,c)=>b+c.techniques.length,0),0);
}
function totalDone(){
  const p = getProgress();
  return Object.keys(p).length;
}
function updateGlobalProg(){
  const total = totalTechs();
  const done = totalDone();
  const pct = Math.round(done/total*100);
  document.getElementById('gp-val').textContent = pct+'%';
  document.getElementById('gp-fill').style.width = pct+'%';
}

// ─── BUILD APP ───
let activeModule = 0;
const openCats = new Set();
const openTechs = new Set();

function buildApp(){
  buildTabs();
  buildPanels();
  updateGlobalProg();
  updateXPChip();
}

function buildTabs(){
  const el = document.getElementById('nav-tabs');
  el.innerHTML = MODULES.map((m,i)=>`
    <div class="nav-tab${i===activeModule?' active':''}" id="tab-${i}" onclick="switchModule(${i})">
      <i class="ti ${m.icon}"></i>${m.label}${m.soon?'<span class="soon-dot"></span>':''}
    </div>`).join('');
  setTimeout(()=>{
    const t = document.getElementById('tab-'+activeModule);
    if(t) t.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  },50);
}

function buildPanels(){
  const el = document.getElementById('module-panels');
  el.innerHTML = MODULES.map((m,mi)=>`
    <div class="module-panel${mi===activeModule?' active':''}" id="panel-${mi}">
      ${m.soon ? buildSoon(m) : buildModule(m, mi)}
    </div>`).join('');
}

function buildSoon(m){
  return`<div class="coming-soon">
    <div class="cs-icon"><i class="ti ${m.icon}"></i></div>
    <div class="cs-title">${m.label}</div>
    <div class="cs-desc">${m.desc}</div>
    <span class="cs-badge">Em breve</span>
  </div>`;
}

function buildModule(m, mi){
  const totalT = m.categories.reduce((a,c)=>a+c.techniques.length,0);
  const doneT = m.categories.reduce((a,c,ci)=>a+c.techniques.filter((_,ti)=>isDone(mi+'-'+ci+'-'+ti)).length,0);
  const pct = Math.round(doneT/totalT*100);
  const fi = focusIdx[mi]||0;

  // Build flat list for focus card
  const allT=[];
  m.categories.forEach((c,ci)=>c.techniques.forEach((t,ti)=>allT.push({t,ci,ti,c})));
  const cur=allT[fi]||allT[0];

  let html='';

  // ── FOCUS CARD (TDAH MODE) ──
  if(cur){
    const extra=EXTRA[cur.t.n]||{pos:'',cm:''};
    const fKey=mi+'-'+cur.ci+'-'+cur.ti;
    const fDone=isDone(fKey);
    html+=`<div class="focus-wrap">
      <div class="focus-hint">🧠 <strong>Modo Foco ativado.</strong> Uma técnica por vez. Sem distrações. Use o timer para cronometrar o treino.</div>
      <div class="focus-nav-row">
        <div class="fnav-btn" onclick="focusNav(${mi},-1)"><i class="ti ti-chevron-left"></i></div>
        <div class="fnav-info">${fi+1} / ${totalT} &nbsp;·&nbsp; ${cur.c.name}</div>
        <div class="fnav-btn" onclick="focusNav(${mi},1)"><i class="ti ti-chevron-right"></i></div>
      </div>
      <div class="focus-card" style="border-top:3px solid ${cur.c.col}">
        <div class="fc-top">
          <div class="fc-cat-lbl" style="color:${cur.c.col}">${cur.c.name}</div>
          <div class="fc-title">${cur.t.n}</div>
        </div>
        <div class="fc-body">
          ${extra.pos?`<div class="pos-box"><span class="pos-lbl">Posição de entrada</span>${extra.pos}</div>`:''}
          <div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:2px">${cur.t.d}</div>
          <div class="fc-steps-list">${cur.t.s.map((st,si)=>`<div class="fc-step">
            <span class="fc-step-n" style="background:${cur.c.colBg};color:${cur.c.col}">${si+1}</span>
            <span class="fc-step-t">${st}</span>
          </div>`).join('')}</div>
          ${extra.cm?`<div class="mistake-box"><i class="ti ti-alert-triangle"></i><span><strong>Erro comum:</strong> ${extra.cm}</span></div>`:''}
          <div class="tip-box"><i class="ti ti-bulb" style="color:var(--amber)"></i><span><strong>Dica:</strong> ${cur.t.t}</span></div>
        </div>
        <div class="fc-actions">
          ${getTimerChipsHTML(cur.t.n)}
          <div style="display:flex;gap:6px">
            <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(cur.t.yt)}" target="_blank" class="act-btn"><i class="ti ti-player-play"></i> YouTube</a>
            <a href="https://www.google.com/search?q=${encodeURIComponent(cur.t.n+' jiu jitsu')}&tbm=isch" target="_blank" class="act-btn"><i class="ti ti-photo"></i> Fotos</a>
          </div>
          <button class="fc-mark-btn${fDone?' done':''}" id="fcbtn-${fKey}" onclick="markDone(event,'${fKey}','${mi}-cat-${cur.ci}',${mi},true)">
            <i class="ti ti-${fDone?'circle-check':'circle-plus'}"></i> ${fDone?'Feito! ✓':'Marcar como feito'}
          </button>
        </div>
      </div>
    </div>`;
  }

  // ── NORMAL MODE HERO ──
  html+=`
  <div class="mod-hero">
    <div class="mod-number">${m.num}</div>
    <div class="mod-meta">
      <div class="mod-badge" style="background:${m.colorBg};color:${m.color}">
        <i class="ti ${m.icon}"></i> Módulo ${m.num} de 09
      </div>
      <div class="mod-title">${m.label}</div>
      <div class="mod-desc">${m.desc}</div>
      <div class="mod-stats-row">
        <div class="mod-stat" style="color:${m.color}"><i class="ti ti-list-check"></i> <span id="mod-done-${mi}">${doneT}</span> / ${totalT}</div>
        <div class="mod-stat"><i class="ti ti-layout-grid"></i> ${m.categories.length} categorias</div>
      </div>
    </div>
  </div>
  <div class="progress-section" style="padding:0">
    <div class="progress-header">
      <span class="progress-label" style="font-size:11px;color:var(--text3)">Progresso do módulo</span>
      <span class="progress-value" style="font-size:11px;color:${m.color}" id="mod-pct-${mi}">${pct}%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="mod-prog-${mi}" style="width:${pct}%;background:${m.color}"></div></div>
  </div>
  <div style="margin-top:12px">`;

  m.categories.forEach((cat,ci)=>{
    const catKey = mi+'-cat-'+ci;
    const isOpen = openCats.has(catKey);
    const catDone = cat.techniques.filter((_,ti)=>isDone(mi+'-'+ci+'-'+ti)).length;
    html += `<div class="cat-block">
      <div class="cat-header" onclick="toggleCat('${catKey}')">
        <div class="cat-icon" style="background:${cat.colBg}"><i class="ti ${cat.icon}" style="color:${cat.col}"></i></div>
        <span class="cat-name">${cat.name}</span>
        <div class="cat-meta">
          <span class="cat-count" id="catcount-${catKey}">${catDone}/${cat.techniques.length}</span>
          <span class="cat-pct" style="color:${cat.col}" id="catpct-${catKey}">${Math.round(catDone/cat.techniques.length*100)}%</span>
        </div>
        <i class="ti ti-chevron-down cat-chev${isOpen?' open':''}" id="catchev-${catKey}"></i>
      </div>
      <div class="cat-body${isOpen?' open':''}" id="catbody-${catKey}">`;
    cat.techniques.forEach((t,ti)=>{
      const tKey = mi+'-'+ci+'-'+ti;
      const done = isDone(tKey);
      const tOpen = openTechs.has(tKey);
      const extra = EXTRA[t.n]||{pos:'',cm:''};
      html += `<div class="tech-card${done?' done-card':''}" id="techcard-${tKey}">
        <div class="tech-row" onclick="toggleTech('${tKey}')">
          <span class="tech-num">${String(ti+1).padStart(2,'0')}</span>
          <span class="tech-dot" style="background:${cat.col}"></span>
          <span class="tech-name">${t.n}</span>
          <span class="tech-badge ${done?'badge-done':'badge-todo'}" id="badge-${tKey}">${done?'✓ Feito':'Pendente'}</span>
          <i class="ti ti-chevron-down tech-chev${tOpen?' open':''}" id="techchev-${tKey}"></i>
        </div>
        <div class="tech-detail${tOpen?' open':''}" id="techdetail-${tKey}">
          ${extra.pos?`<div class="pos-box" style="margin-top:10px"><span class="pos-lbl">Posição de entrada</span>${extra.pos}</div>`:''}
          <div class="detail-desc">${t.d}</div>
          <div class="steps-list">${t.s.map((st,si)=>`<div class="step-item">
            <span class="step-num" style="background:${cat.colBg};color:${cat.col}">${si+1}</span>
            <span>${st}</span>
          </div>`).join('')}</div>
          ${extra.cm?`<div class="mistake-box"><i class="ti ti-alert-triangle"></i><span><strong>Erro comum:</strong> ${extra.cm}</span></div>`:''}
          <div class="tip-box"><i class="ti ti-bulb" style="color:var(--amber)"></i><span><strong>Dica:</strong> ${t.t}</span></div>
          ${getTimerChipsHTML(t.n)}
          <div class="action-row">
            <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(t.yt)}" target="_blank" class="act-btn"><i class="ti ti-player-play"></i> YouTube</a>
            <a href="https://www.google.com/search?q=${encodeURIComponent(t.n+' jiu jitsu')}&tbm=isch" target="_blank" class="act-btn"><i class="ti ti-photo"></i> Imagens</a>
            <button class="act-btn${done?' done-btn':''}" id="donebtn-${tKey}" onclick="markDone(event,'${tKey}','${catKey}',${mi})">
              <i class="ti ti-${done?'circle-check':'circle-plus'}"></i> ${done?'Feito':'Marcar'}
            </button>
          </div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;
  return html;
}

function switchModule(i){
  activeModule = i;
  document.querySelectorAll('.nav-tab').forEach((t,ti)=>{
    t.classList.toggle('active', ti===i);
    t.style.color = ti===i ? MODULES[i].color : '';
    t.style.borderBottomColor = ti===i ? MODULES[i].color : '';
  });
  document.querySelectorAll('.module-panel').forEach((p,pi)=>{
    p.classList.toggle('active', pi===i);
  });
  const t = document.getElementById('tab-'+i);
  if(t) t.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleCat(key){
  if(openCats.has(key)) openCats.delete(key); else openCats.add(key);
  const open = openCats.has(key);
  document.getElementById('catbody-'+key)?.classList.toggle('open', open);
  document.getElementById('catchev-'+key)?.classList.toggle('open', open);
}

function toggleTech(key){
  if(openTechs.has(key)) openTechs.delete(key); else openTechs.add(key);
  const open = openTechs.has(key);
  document.getElementById('techdetail-'+key)?.classList.toggle('open', open);
  document.getElementById('techchev-'+key)?.classList.toggle('open', open);
}

function markDone(e, tKey, catKey, mi, isFocus){
  e.stopPropagation();
  const wasDone = isDone(tKey);
  toggleDoneKey(tKey);
  const done = isDone(tKey);

  // XP
  let xp = getXP();
  if(!wasDone && done){ xp+=10; saveXP(xp); showXPToast(10); }
  else if(wasDone && !done){ xp=Math.max(0,xp-10); saveXP(xp); }
  updateXPChip();

  // Update normal card
  const card = document.getElementById('techcard-'+tKey);
  const badge = document.getElementById('badge-'+tKey);
  const btn = document.getElementById('donebtn-'+tKey);
  if(card) card.classList.toggle('done-card', done);
  if(badge){badge.textContent=done?'✓ Feito':'Pendente';badge.className='tech-badge '+(done?'badge-done':'badge-todo');}
  if(btn){btn.className='act-btn'+(done?' done-btn':'');btn.innerHTML=`<i class="ti ti-${done?'circle-check':'circle-plus'}"></i> ${done?'Feito':'Marcar'}`;}

  // Update focus card button
  const fcbtn = document.getElementById('fcbtn-'+tKey);
  if(fcbtn){fcbtn.className='fc-mark-btn'+(done?' done':'');fcbtn.innerHTML=`<i class="ti ti-${done?'circle-check':'circle-plus'}"></i> ${done?'Feito! ✓':'Marcar como feito'}`;}

  // Update category + module counters
  const m = MODULES[mi];
  const ci = parseInt(catKey.split('-cat-')[1]);
  const cat = m.categories[ci];
  const catDone = cat.techniques.filter((_,ti)=>isDone(mi+'-'+ci+'-'+ti)).length;
  const catPct = Math.round(catDone/cat.techniques.length*100);
  const ccEl = document.getElementById('catcount-'+catKey);
  const cpEl = document.getElementById('catpct-'+catKey);
  if(ccEl) ccEl.textContent = `${catDone}/${cat.techniques.length}`;
  if(cpEl) cpEl.textContent = catPct+'%';
  const totalT = m.categories.reduce((a,c)=>a+c.techniques.length,0);
  const doneT = m.categories.reduce((a,c,ci2)=>a+c.techniques.filter((_,ti)=>isDone(mi+'-'+ci2+'-'+ti)).length,0);
  const modPct = Math.round(doneT/totalT*100);
  const progEl = document.getElementById('mod-prog-'+mi);
  const pctEl = document.getElementById('mod-pct-'+mi);
  const doneEl = document.getElementById('mod-done-'+mi);
  if(progEl) progEl.style.width = modPct+'%';
  if(pctEl) pctEl.textContent = modPct+'%';
  if(doneEl) doneEl.textContent = doneT;
  updateGlobalProg();

  // Auto-advance in TDAH mode
  if(isFocus && done){
    const fi = focusIdx[mi]||0;
    if(fi < totalT-1){
      setTimeout(()=>focusNav(mi,1), 900);
    }
  }
}

// ─── ADMIN ───
function renderAdminUsers(){
  const users = getUsers();
  const list = document.getElementById('admin-user-list');
  const entries = Object.entries(users);
  if(entries.length===0){list.innerHTML='<div style="font-size:13px;color:var(--text3);text-align:center;padding:8px">Nenhum usuário cadastrado.</div>';return;}
  list.innerHTML = entries.map(([email, u])=>`
    <div class="admin-user-item">
      <span class="email">${email}</span>
      <span class="role">${u.role==='admin'?'admin':'aluno'}</span>
      ${email!==ADMIN?`<button class="del-btn" onclick="removeUser('${email}')"><i class="ti ti-trash"></i></button>`:'<span style="width:24px"></span>'}
    </div>`).join('');
}

async function addUser(){
  const email = document.getElementById('new-email').value.trim().toLowerCase();
  const pass = document.getElementById('new-pass').value;
  const name = document.getElementById('new-name').value.trim();
  const msg = document.getElementById('admin-msg');
  msg.textContent='';
  if(!email||!pass||!name){msg.textContent='Preencha todos os campos.';msg.className='admin-msg err';return;}
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){msg.textContent='E-mail inválido.';msg.className='admin-msg err';return;}
  const users = getUsers();
  if(users[email]){msg.textContent='E-mail já cadastrado.';msg.className='admin-msg err';return;}
  const hash = await sha256(pass);
  users[email]={name, hash, role:'student'};
  saveUsers(users);
  document.getElementById('new-email').value='';
  document.getElementById('new-pass').value='';
  document.getElementById('new-name').value='';
  msg.textContent='Aluno cadastrado com sucesso!';msg.className='admin-msg ok';
  renderAdminUsers();
  setTimeout(()=>msg.textContent='',3000);
}

function removeUser(email){
  if(!confirm(`Remover ${email}?`)) return;
  const users = getUsers();
  delete users[email];
  saveUsers(users);
  renderAdminUsers();
}

  const s = getSession();
